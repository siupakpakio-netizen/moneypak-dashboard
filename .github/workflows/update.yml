name: Update Dashboard
on:
  schedule:
    - cron: '*/5 9-11,13-15 * * 1-5'  # HK market (Mon-Fri)
    - cron: '*/5 21,22,23,0,1,2,3 * * 0-4'  # US market (Sun-Thu nights HKT)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Fetch HK data from Google Sheet
        run: |
          python3 -c "
          import json, urllib.request
          SHEET_ID = '1xqfcjSPHaHg-4n7k8t0eMmJ6X6eL9sMB6tc04_PUD-8'
          def fetch(gid):
              url = f'https://docs.google.com/spreadsheets/d/{SHEET_ID}/gviz/tq?tqx=out:json&gid={gid}'
              with urllib.request.urlopen(url) as r:
                  return json.loads(r.read().decode()[47:-2])
          try:
              trades = fetch(0)
              history = fetch(1139931391)
              data = {'trades': trades, 'history': history}
              with open('dashboard_data.json','w') as f:
                  json.dump(data, f)
              print('✅ HK data updated')
          except Exception as e:
              print(f'⚠️ {e}')
          "
      - name: Commit and deploy
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git diff --staged --quiet || (git commit -m "🔄 Auto-update $(date -u +%Y-%m-%dT%H:%M)" && git push)
